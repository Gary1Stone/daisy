{{template "partials/top2" .}} {{template "partials/navbar2" .}}
<main class="container">
  <div class="grid">
    <article>
      <header><span id="greeting"></span> {{ .firstName }}</header>
      {{ .lastLoginMsg }}
    </article>
    
    <article>
      <header>{{.devices}} Assigned Devices</header>
      {{ .assigned }}
    </article>
  </div>

  <div class="grid">
    <article>
      <header>
        {{.wizard}} Wizards
      </header>
      <select id="wizkey" name="wizkey" class="icon-select">
        <option value="SIGHTING" selected="selected" class="success">I saw...</option>
        <option value="USING" class="success">I used...</option>
        <option value="CLAIMING" class="success">I claim...</option>
        <option value="GIVING" class="success">I gave...</option>
        <option value="CARE" class="alert">It needs care...</option>
        <option value="BROKEN" class="alert">It broke...</option>
        <option value="DIED" class="alert">It died...</option>
        <option value="LOST" class="alert">It's lost...</option>
        <option value="BACKUP" class="info">I backed up...</option>
        <option value="INSTALL" class="info">I installed software...</option>
        <option value="REQUEST" class="warning">I need software...</option>
      </select>
      <footer>
        <button onclick="startWizard()">Wizard...</button>
      </footer>
    </article>
    
    <article>
      <header class="{{ .btnColour }}">
        {{.bell}} Alerts
      </header>
      <section id="alerts">
        {{ .myAlerts }}
      </section>
      <footer>
        <a href="tickets.html" role="button">{{.ticket}} {{ .btnLabel }}</a>
      </footer>
    </article>
  </div>

</main>
<footer class="container">
</footer>

<script src="js/home.js" defer></script>
{{template "partials/bottom2" .}}
