{{template "partials/top2" .}} {{template "partials/navbar2" .}}
<main class="container">
  <div class="grid">
    <article>
      <header><span id="greeting"></span> {{ .firstName }}</header>
      {{ .lastLoginMsg }}
    </article>
    
    <article>
      <header>{{.devices}} Assigned Devices</header>
      {{ .assigned }}
    </article>
  </div>

  <div class="grid">
    <article>
      <header>
        {{.wizard}} Wizards
      </header>
      <div class="custom-select">
        <select id="wizkey" name="wizkey">
          <option value="SIGHTING" selected="selected">{{.eye}} I saw...</option>
          <option value="USING">{{.ticket}} I used...</option>
          <option value="CLAIMING">{{.tag}} I claim...</option>
          <option value="GIVING">{{.tag}} I gave...</option>
          <option value="CARE">{{.wrench}} It needs care...</option>
          <option value="BROKEN">{{.broken}} It broke...</option>
          <option value="DIED">{{.stethoscope}} It died...</option>
          <option value="LOST">{{.footprint}} It's lost...</option>
          <option value="BACKUP">{{.copy}} I backed up...</option>
          <option value="INSTALL">{{.software}} I installed software...</option>
          <option value="REQUEST">{{.software}} I need software...</option>
        </select>
      </div>
      <footer>
        <button onclick="startWizard()">Wizard...</button>
      </footer>
    </article>
    
    <article>
      <header class="{{ .btnColour }}">
        {{.bell}} Alerts
      </header>
      <section id="alerts">
        {{ .myAlerts }}
      </section>
      <footer>
        <a href="tickets.html" role="button">{{.ticket}} {{ .btnLabel }}</a>
      </footer>
    </article>
  </div>

</main>
<footer class="container">
</footer>

<script src="js/home.js" defer></script>
{{template "partials/bottom2" .}}
