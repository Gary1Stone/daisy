{{template "partials/top" .}}
<main class="myCards">
    <div class="myCard">
        <header class='gradient_gray'><span class='mif-user mif-2x'></span> Registration</header>
            <section>
                <form onsubmit="event.preventDefault();"
                    id="theForm" name="theForm" autocomplete="off"
                    action="#" method="post"
                    data-role="validator"
                    data-interactive-check="false"
                    data-on-before-submit="return okayClick();">
                    <h3>
                        <span style="font-size:2rem">&#127809;</span>DAISY
                    </h3>
                    <div class="form-group mt-5">
                        <input type="hidden" id="apicode" name="apicode" value="{{.apicode}}">
                        <label for="username">User ID</label>
                        <input type="email" 
                            id="username" name="username" placeholder="username" value="{{.user}}" title="User Identifier"
                            autocomplete="email" 
                            required minlength="6" maxlength="60"
                            autofocus
                            data-role="input" data-prepend="<span class='mif-user'></span>"
                            data-validate="required email minlength=6 maxlength=60" >
                        <small class="invalid_feedback">Required. Your assigned email address</small>
                    </div>

                    <div class="form-group"  id="enterPassscode" style="display:none">
                        <label for="passcode">Passcode (valid for <span id="mins">15</span> minutes)</label>
                        <input type="text" 
                            id="passcode" name="passcode" disabled placeholder="passcode" value=""
                            minlength="5" maxlength="20" required 
                            data-role="input" data-prepend="<span class='mif-key'></span>"
                            data-validate="required minlength=6 maxlength=100" >
                        <small class="invalid_feedback">Enter the passcode emailed to you.</small>
                    </div>
                    <p id="message"></p>
                </form>

            </section>
            <footer>
                <input type="submit" value="Okay" form="theForm" class="button">
            </footer>
        <section>
            <small class="fg-darkGray">
                <p>All Rights reserved.</p>
                <p>For further information contact: webmaster@wknc.ca</p>
            </small>
        </section>
    </div>
</main>
<script src="js/index.es5.umd.min.js" defer></script>
<script src="js/registration.js" defer></script>
{{template "partials/bottom" .}}
